name: Precompile NIFs

on:
  workflow_dispatch:

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        nif: ["2.17"]
        job:
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04, use-cross: true }
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-24.04 }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Extract crate information
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-precomp
          shared-key: ${{ matrix.job.target }}-${{ matrix.nif }}
          workspaces: "native/obscurax"

      - name: Build the NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: obscurax
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          cross-version: from-source
          project-dir: "native/obscurax"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

  generate-checksum:
    name: Generate checksum
    needs: build_release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract crate information
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksum
        run: |
          # Compute SHA-256 checksums for each NIF artifact
          CHECKSUM_FILE="checksum-Elixir.Obscurax.Nif.exs"
          echo "%{" > "$CHECKSUM_FILE"
          first=true
          for f in artifacts/*.tar.gz; do
            filename=$(basename "$f")
            hash=$(sha256sum "$f" | awk '{print $1}')
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> "$CHECKSUM_FILE"
            fi
            printf '  "%s" => "sha256:%s"' "$filename" "$hash" >> "$CHECKSUM_FILE"
          done
          echo "" >> "$CHECKSUM_FILE"
          echo "}" >> "$CHECKSUM_FILE"
          cat "$CHECKSUM_FILE"

      - name: Create tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git add checksum-*.exs
          git commit -m "chore: update precompiled NIF checksums for v${{ env.PROJECT_VERSION }}"
          git tag v${{ env.PROJECT_VERSION }}
          git push origin main --tags

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.PROJECT_VERSION }}
          name: v${{ env.PROJECT_VERSION }}
          files: |
            artifacts/*.tar.gz
            checksum-*.exs
