name: Precompile NIFs

on:
  push:
    branches:
      - main
    paths:
      - "native/**"
      - ".github/workflows/release.yml"
    tags:
      - "*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        nif: ["2.17"]
        job:
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04, use-cross: true }
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-24.04 }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Extract crate information
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-precomp
          shared-key: ${{ matrix.job.target }}-${{ matrix.nif }}
          workspaces: "native/obscurax"

      - name: Build the NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: obscurax
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          cross-version: from-source
          project-dir: "native/obscurax"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.build-crate.outputs.file-path }}
        if: startsWith(github.ref, 'refs/tags/')

  generate-checksum:
    name: Generate checksum
    needs: build_release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      OBSCURAX_BUILD: "true"
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install deps
        run: mix deps.get

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksum file
        run: |
          mkdir -p priv/native
          cp artifacts/*.tar.gz priv/native/ 2>/dev/null || true
          mix rustler_precompiled.download Obscurax.Nif --only-local --all

      - name: Commit checksum file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-*.exs
          git commit -m "chore: update precompiled NIF checksums for ${{ github.ref_name }}"
          git push

      - name: Upload checksum to release
        uses: softprops/action-gh-release@v3
        with:
          files: checksum-*.exs
