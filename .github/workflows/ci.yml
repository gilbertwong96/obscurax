name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  OBSCURAX_BUILD: "true"

jobs:
  test:
    name: Build & Test (${{ matrix.os }} / OTP ${{ matrix.otp }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            otp: "29"
          - os: macos-14
            otp: "27"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: "1.20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Restore Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/obscurax/target
          key: cargo-${{ runner.os }}-${{ hashFiles('native/obscurax/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Restore Mix cache
        uses: actions/cache@v5
        with:
          path: |
            _build
            deps
          key: mix-${{ runner.os }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-${{ matrix.otp }}-

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile --all-warnings --warnings-as-errors

      - name: Check formatted
        run: mix format --check-formatted

      - name: Run tests with coverage
        run: mix coveralls.json

      - name: Post coverage to Codecov
        if: runner.os == 'Linux'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -z "$CODECOV_TOKEN" ]; then
            echo "::notice::CODECOV_TOKEN not set - skipping Codecov upload."
            echo "Add it at https://codecov.io/gh/gilbertwong96/obscurax"
            echo "to enable the coverage badge."
            exit 0
          fi
          curl -Os https://uploader.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov --token "$CODECOV_TOKEN" --file ./cover/excoveralls.json
