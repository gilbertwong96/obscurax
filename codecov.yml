codecov:
  require_ci_to_pass: false
  notify:
    after_n_builds: 1
    wait_for_ci: true

ignore:
  - "native/**"
  - "priv/**"
  - "cover/**"
  - "deps/**"
  - "_build/**"

coverage:
  precision: 2
  round: down
  range: 70...90
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%
    changes: off
