# V8 uses thread-local storage (TLS) variables like g_current_isolate_.
# When building a cdylib (shared library), the default "initial-exec" TLS model
# causes R_X86_64_TPOFF32 relocation errors on Linux. Using "global-dynamic"
# avoids this. See: https://github.com/denoland/rusty_v8/issues/892
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "tls-model=global-dynamic"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "tls-model=global-dynamic"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static", "-C", "tls-model=global-dynamic"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static", "-C", "tls-model=global-dynamic"]
